<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>HerFIT 大使計劃</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  .reel {
    width: 390px;
    height: 693px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #F5F0EA 0%, #EDE5D8 40%, #E2D5C3 100%);
  }
  .arch {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -56%);
    width: 280px;
    height: 340px;
    border: 1px solid rgba(139, 107, 82, 0.25);
    border-radius: 140px 140px 0 0;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 28px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .brand-pill {
    background: rgba(139, 107, 82, 0.12);
    border: 1px solid rgba(139, 107, 82, 0.3);
    padding: 7px 16px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #8B6B52;
  }
  .brand-logo {
    font-size: 14px;
    font-weight: 700;
    color: #3D2B1F;
    letter-spacing: 1px;
  }
  .brand-logo span { color: #B87E6A; }

  .float-1 {
    position: absolute;
    top: 20%;
    left: 18px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(139, 107, 82, 0.45);
    writing-mode: vertical-rl;
  }
  .float-2 {
    position: absolute;
    top: 20%;
    right: 18px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(139, 107, 82, 0.45);
    writing-mode: vertical-rl;
  }

  .center-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    z-index: 5;
  }
  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B87E6A;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 24px;
    height: 1px;
    background: rgba(184,126,106,0.5);
  }
  .main-headline {
    font-family: Georgia, serif;
    font-size: 80px;
    font-weight: 700;
    line-height: 0.88;
    color: #2A1C14;
    text-align: center;
    letter-spacing: -2px;
    margin-bottom: 6px;
  }
  .main-headline .accent {
    font-style: italic;
    color: #B87E6A;
  }
  .sub-headline {
    font-family: Georgia, serif;
    font-size: 24px;
    font-weight: 700;
    font-style: italic;
    color: #5C3D2B;
    text-align: center;
    margin-bottom: 32px;
  }
  .divider {
    width: 36px;
    height: 1px;
    background: rgba(139, 107, 82, 0.4);
    margin: 0 auto 28px;
  }
  .description {
    font-size: 13px;
    font-weight: 300;
    color: #7A5C48;
    text-align: center;
    line-height: 2;
    letter-spacing: 0.3px;
  }

  .dot-row {
    position: absolute;
    bottom: 30%;
    left: 28px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(184,126,106,0.5);
  }
  .dot:nth-child(2) { opacity: 0.5; }
  .dot:nth-child(3) { opacity: 0.25; }

  .bottom-cta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 28px 36px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 11px;
  }
  .cta-button {
    width: 100%;
    background: #2A1C14;
    color: #F5F0EA;
    padding: 16px 0;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-align: center;
  }
  .cta-note {
    font-size: 11px;
    color: #9E7A66;
    letter-spacing: 0.5px;
    font-weight: 300;
  }
</style>
</head>
<body>
<div class="reel">
  <div class="arch"></div>
  <div class="top-bar">
    <div class="brand-pill">HerFIT</div>
    <div class="brand-logo">Her<span>FIT</span></div>
  </div>
  <div class="float-1">30+ Women · Real</div>
  <div class="float-2">2026 · 大使計劃</div>
  <div class="center-content">
    <div class="eyebrow">正式開始</div>
    <div class="main-headline">大使<br><span class="accent">計劃</span></div>
    <div class="sub-headline">申請開始了。</div>
    <div class="divider"></div>
    <p class="description">不看粉絲數。<br>只看妳夠不夠真實。<br>我們在找 30+ 的妳。</p>
  </div>
  <div class="dot-row">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="bottom-cta">
    <div class="cta-button">立即申請 · Link in Bio</div>
    <div class="cta-note">不需要完美 · 只需要真實</div>
  </div>
</div>
</body>
</html>
