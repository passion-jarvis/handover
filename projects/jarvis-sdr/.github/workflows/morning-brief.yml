name: SDR Morning Brief

on:
  schedule:
    # Every weekday 8 AM PT = 15:00 UTC (16:00 UTC when DST)
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
    inputs:
      top:
        description: "Number of leads to surface"
        default: "5"
      days:
        description: "Look back N days"
        default: "1"

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post morning brief to Slack
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_TAB_NAME: ${{ secrets.GOOGLE_SHEETS_TAB_NAME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TOP=${{ github.event.inputs.top || '5' }}
          DAYS=${{ github.event.inputs.days || '1' }}
          python scripts/morning_brief.py --top $TOP --days $DAYS
